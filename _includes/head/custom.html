{% assign favicon_base = site.author.avatar | default: "images/favicon-32x32.png" %}
<link rel="icon" type="image/png" sizes="32x32" href="{{ favicon_base }}?size=32">
<link rel="shortcut icon" href="{{ favicon_base }}?size=32">
<link rel="icon" type="image/png" sizes="16x16" href="{{ favicon_base }}?size=16">
<link rel="apple-touch-icon" sizes="180x180" href="{{ favicon_base }}?size=180">
<link rel="manifest" href="images/site.webmanifest">
<meta name="theme-color" content="#ffffff">
<link rel="stylesheet" href="assets/css/academicons.css"/>

<script type="text/x-mathjax-config"> MathJax.Hub.Config({ TeX: { equationNumbers: { autoNumber: "all" } } }); </script>
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {
      inlineMath: [ ['$','$'], ["\\(","\\)"] ],
      processEscapes: true
    }
  });
</script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/latest.js?config=TeX-MML-AM_CHTML' async></script>

<!-- end custom head snippets -->
